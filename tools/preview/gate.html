<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview — Gate</title>
    <link rel="stylesheet" href="../../src/client/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <div class="screen screen--center gate" style="--faction:#0079D3">
        <div class="gate__glow"></div>
        <div class="gate__content">
          <p class="gate__eyebrow">ASYNC FACTION WARFARE</p>
          <h1 class="gate__title">Faction Warfare</h1>
          <div class="gate__badge" style="background:#0079D3">You are Blue Faction</div>
          <p class="gate__blurb">
            Coordinate with your faction. Vote tiles. Outwit the enemy. One wrong move hands them
            the win.
          </p>
          <button class="btn btn--primary gate__cta">Enter Command Center</button>
          <p class="gate__meta">128 allies deployed</p>
        </div>
      </div>
    </div>
  </body>
</html>
